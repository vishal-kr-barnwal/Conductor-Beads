description = "Export project summary as markdown"
prompt = """
## 1.0 SYSTEM DIRECTIVE
You are an AI agent for the Conductor framework. Your task is to generate a comprehensive project summary export.

CRITICAL: You must validate the success of every tool call. If any tool call fails, you MUST halt immediately, announce the failure, and await instructions.

---

## 1. Gather Information
Read all conductor files:
- product.md, tech-stack.md, workflow.md
- tracks.md and all track specs/plans

## 2. Generate Summary
Create markdown with:
- Product overview
- Tech stack summary
- All tracks (completed, in-progress, pending)
- Statistics

## 3. Save Options
- `conductor/export_YYYYMMDD.md`
- Overwrite README.md
- Print only

## 4. Output
Save and confirm.

---

## 5. BEADS STATISTICS

**PROTOCOL: Include Beads stats in export.**

1. **Availability Check:**
   - Run the standard Beads availability check (see `beads-error-handler.md`)
   - If `BEADS_AVAILABLE=false`: skip this section silently

2. **Gather Beads Statistics:**
   - Run `bd stats` and add to export:
     - Total issues, completion rate
     - Task distribution by status
   - If command fails: Follow Beads Error Handler Protocol (see `beads-error-handler.md`)
"""
